{% extends "_base.html" %}

{% block title %}Register for Event{% endblock %}

{% block content %}

<div class="bg-white p-8 rounded-lg shadow-md max-w-md mx-auto">
<h1 class="text-3xl font-bold text-center mb-6 text-gray-900">Register Team for "{{ event.name }}"</h1>
<form action="{{ url_for('register_event', event_id=event.id) }}" method="POST">
<div class="mb-4">
<label for="team_name" class="block text-gray-700 font-bold mb-2">Team Name</label>
<input type="text" id="team_name" name="team_name" required
class="shadow-sm appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500">
</div>
<div class="flex items-center justify-between">
<button type="submit"
class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg focus:outline-none focus:shadow-outline transition duration-300">
Register Team
</button>
</div>
</form>
</div>
{% endblock %}
