{% extends "_base.html" %}

{% block title %}Create Event{% endblock %}

{% block content %}

<div class="form-center">
    <div class="form-container">
        <div class="form-card">
            <h1 class="text-3xl font-bold text-center mb-6 text-gray-100">Create New Event</h1>
            <form action="{{ url_for('create_event') }}" method="POST">
                <div class="form-group">
                    <label for="name" class="block text-gray-300 font-bold mb-2">Event Name</label>
                    <input type="text" id="name" name="name" required
                        class="form-control" placeholder="Enter event name">
                </div>
                <div class="form-group">
                    <label for="start_date" class="block text-gray-300 font-bold mb-2">Start Date</label>
                    <input type="date" id="start_date" name="start_date" required
                        class="form-control">
                </div>
                <div class="flex items-center justify-between">
                    <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg focus:outline-none focus:shadow-outline transition duration-300">
                        Create Event
                    </button>
                </div>
                <div class="text-center mt-4">
                    <a href="{{ url_for('admin_dashboard') }}" 
                       class="text-blue-400 hover:text-blue-300 font-medium">← Back to Dashboard</a>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}
